name: Release

on:
  push:
    branches: [ main ]

jobs:
  build-release:
    name: Build signed release AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Inject secrets into local.properties
        run: |
          echo "supabase.url=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "supabase.anonKey=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Create google-services.json from GitHub secret
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode keystore from GitHub secret
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > keystore/release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run full test suite before release
        run: ./gradlew testReleaseUnitTest

      - name: Build signed release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub release tag
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
