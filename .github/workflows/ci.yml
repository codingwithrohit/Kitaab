name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Create secrets file
        run: |
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/secrets.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="supabase_url">https://placeholder.supabase.co</string>
            <string name="supabase_anon_key">placeholder_key</string>
          </resources>
          EOF

      - name: Create google-services.json placeholder
        run: |
          cat > app/google-services.json << EOF
          {
            "project_info": { "project_id": "placeholder" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000:android:000" }, "api_key": [{ "current_key": "placeholder" }] }],
            "configuration_version": "1"
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Create secrets file
        run: |
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/secrets.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="supabase_url">https://placeholder.supabase.co</string>
            <string name="supabase_anon_key">placeholder_key</string>
          </resources>
          EOF

      - name: Create google-services.json placeholder
        run: |
          cat > app/google-services.json << EOF
          {
            "project_info": { "project_id": "placeholder" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000:android:000" }, "api_key": [{ "current_key": "placeholder" }] }],
            "configuration_version": "1"
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Create secrets file
        run: |
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/secrets.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="supabase_url">https://placeholder.supabase.co</string>
            <string name="supabase_anon_key">placeholder_key</string>
          </resources>
          EOF

      - name: Create google-services.json placeholder
        run: |
          cat > app/google-services.json << EOF
          {
            "project_info": { "project_id": "placeholder" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000:android:000" }, "api_key": [{ "current_key": "placeholder" }] }],
            "configuration_version": "1"
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
